---
name: CodeCov
description: "Reports testing coverage for the repository"
inputs:
  token:
    description: "Codecov upload token"
    required: true
runs:
  using: composite
  steps:
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.out
        flags: unittests
        fail_ci_if_error: false
        token: ${{ inputs.token }}
